<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Simon Says Game</h1>
    <h2 id="level-title">Press any key to start the game</h2>
    
    <div class="btn-container">
        <div class="line-one">
            <div class="btn btn1" type="button" id="red">1</div>
            <div class="btn btn2" type="button" id="green">2</div>
        </div>
        <div class="line-two">
            <div class="btn btn3" type="button" id="orange">3</div>
            <div class="btn btn4" type="button" id="blue">4</div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
