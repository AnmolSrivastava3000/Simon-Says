<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Simon Says Game</title>
</head>
<body>
    <h1>Simon Says Game</h1>
    <h2 id="level-title">Press Start to Begin</h2>
    
    <button id="start-btn">Tap to Start</button>
    <button id="share-btn" style="display: none;">Share Score to X</button>

    <div class="btn-container">
        <div class="line-one">
            <div class="btn btn1" id="red">1</div>
            <div class="btn btn2" id="green">2</div>
        </div>
        <div class="line-two">
            <div class="btn btn3" id="orange">3</div>
            <div class="btn btn4" id="blue">4</div>
        </div>
    </div>
</body>
</html>
